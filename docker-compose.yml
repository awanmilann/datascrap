version: "3.8"

services:
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - scraper

  scraper:
    build:
      context: .
      dockerfile: docker/Dockerfile.scraper
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - SUPABASE_URL
      - SUPABASE_SERVICE_ROLE_KEY
      - SCRAPER_INTERNAL_API_KEY
      - WEBHOOK_SECRET

  scraper-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.scraper
    command: python -m app.workers.worker
    env_file: .env
    depends_on:
      - scraper
